name: Build and Push Docker Images to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push frontend image
        env:
          ECR_FRONTEND_REPOSITORY: 596432515527.dkr.ecr.ap-southeast-1.amazonaws.com/desacare-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t "$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG" ./frontend
          docker push "$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG"

      - name: Build, tag, and push backend image
        env:
          ECR_BACKEND_REPOSITORY: 596432515527.dkr.ecr.ap-southeast-1.amazonaws.com/desacare-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t "$ECR_BACKEND_REPOSITORY:$IMAGE_TAG" ./backend
          docker push "$ECR_BACKEND_REPOSITORY:$IMAGE_TAG"
