name: Build and Push Docker Images to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push frontend image
        env:
          ECR_FRONTEND_REPOSITORY: ${{ secrets.ECR_FRONTEND_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t desacare-frontend:$IMAGE_TAG ./frontend
          docker tag desacare-frontend:$IMAGE_TAG $ECR_FRONTEND_REPOSITORY:$IMAGE_TAG
          docker push $ECR_FRONTEND_REPOSITORY:$IMAGE_TAG

      - name: Build, tag, and push backend image
        env:
          ECR_BACKEND_REPOSITORY: ${{ secrets.ECR_BACKEND_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t desacare-backend:$IMAGE_TAG ./backend
          docker tag desacare-backend:$IMAGE_TAG $ECR_BACKEND_REPOSITORY:$IMAGE_TAG
          docker push $ECR_BACKEND_REPOSITORY:$IMAGE_TAG
