name: Build and Push Docker Images to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate AWS secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          test -n "$AWS_ACCESS_KEY_ID" || (echo "AWS_ACCESS_KEY_ID secret is not set" && exit 1)
          test -n "$AWS_SECRET_ACCESS_KEY" || (echo "AWS_SECRET_ACCESS_KEY secret is not set" && exit 1)
          test -n "$AWS_REGION" || (echo "AWS_REGION secret is not set" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS credentials
        run: |
          aws sts get-caller-identity

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Validate ECR repositories
        env:
          ECR_FRONTEND_REPOSITORY: ${{ secrets.ECR_FRONTEND_REPOSITORY }}
          ECR_BACKEND_REPOSITORY: ${{ secrets.ECR_BACKEND_REPOSITORY }}
        run: |
          set -euo pipefail
          test -n "$ECR_FRONTEND_REPOSITORY" || (echo "ECR_FRONTEND_REPOSITORY secret is not set" && exit 1)
          test -n "$ECR_BACKEND_REPOSITORY" || (echo "ECR_BACKEND_REPOSITORY secret is not set" && exit 1)
          FRONTEND_REPOSITORY_NAME="${ECR_FRONTEND_REPOSITORY#*/}"
          BACKEND_REPOSITORY_NAME="${ECR_BACKEND_REPOSITORY#*/}"
          aws ecr describe-repositories --repository-names "$FRONTEND_REPOSITORY_NAME"
          aws ecr describe-repositories --repository-names "$BACKEND_REPOSITORY_NAME"

      - name: Build, tag, and push frontend image
        env:
          ECR_FRONTEND_REPOSITORY: ${{ secrets.ECR_FRONTEND_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t desacare-frontend:$IMAGE_TAG ./frontend
          docker tag desacare-frontend:$IMAGE_TAG $ECR_FRONTEND_REPOSITORY:$IMAGE_TAG
          docker push $ECR_FRONTEND_REPOSITORY:$IMAGE_TAG

      - name: Build, tag, and push backend image
        env:
          ECR_BACKEND_REPOSITORY: ${{ secrets.ECR_BACKEND_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t desacare-backend:$IMAGE_TAG ./backend
          docker tag desacare-backend:$IMAGE_TAG $ECR_BACKEND_REPOSITORY:$IMAGE_TAG
          docker push $ECR_BACKEND_REPOSITORY:$IMAGE_TAG
